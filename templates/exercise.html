<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Exercise Calories</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">
  <h2 class="text-center mb-4">🔥 Exercise Calories Burned</h2>

  <form method="POST" class="d-flex justify-content-center">
    <input
      type="text"
      name="activity"
      class="form-control w-50 me-2"
      placeholder="Example: 30 min walk, 50 push ups"
      required
    >
    <button class="btn btn-primary">Search</button>
  </form>

  <p class="text-center text-muted mt-3">
    Searches calories burned using Google
  </p>
</div>

</body>
</html>
