<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Water Intake – FitnessApp</title>
<!-- Bootstrap & Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

<style>
:root {
  --primary: #ffffff;
  --secondary: #888888;
  --bg-dark: #000000;
  --glass: rgba(255, 255, 255, 0.05);
  --glass-border: rgba(255, 255, 255, 0.1);
  --accent: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
}

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://images.unsplash.com/photo-1548932813-71ede3044a42?auto=format&fit=crop&q=80');
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  color: #fff;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== NAVBAR ===== */
.navbar {
  background: rgba(0,0,0,0.8) !important;
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--glass-border);
}

.navbar-brand { color: var(--primary) !important; }

.btn-back {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  color: #fff;
  border-radius: 10px;
  padding: 8px 16px;
  text-decoration: none;
  transition: all 0.3s ease;
}

.btn-back:hover {
  background: rgba(255, 255, 255, 0.1);
  color: #fff;
}

/* ===== MAIN CONTAINER ===== */
.main-box {
  max-width: 500px;
  margin: auto;
  background: var(--glass);
  backdrop-filter: blur(15px);
  border: 1px solid var(--glass-border);
  border-radius: 25px;
  padding: 40px;
}

/* ===== WATER GLASS ===== */
.glass-box {
  width: 140px;
  height: 240px;
  border: 4px solid rgba(255, 255, 255, 0.2);
  border-top: none;
  border-radius: 0 0 20px 20px;
  margin: auto;
  background: rgba(255, 255, 255, 0.05);
  overflow: hidden;
  position: relative;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.water-fill {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  background: #3a7bd5;
  box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
  transition: height 0.5s ease;
}

.water-fill::before {
  content: "";
  position: absolute;
  width: 250%;
  height: 250%;
  background: rgba(255, 255, 255, 0.15);
  top: -240%;
  left: -75%;
  border-radius: 42%;
  animation: wave 10s infinite linear;
}

@keyframes wave {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.bubble {
  position: absolute;
  background: rgba(255, 255, 255, 0.4);
  border-radius: 50%;
  bottom: -20px;
  animation: float 3s infinite ease-in;
}

@keyframes float {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-200px); opacity: 0; }
}

.counter {
  font-size: 1.5rem;
  font-weight: 700;
  margin-bottom: 20px;
}

/* ===== FORM ELEMENTS ===== */
.form-control {
  background: rgba(255, 255, 255, 0.1);
  border: 1px solid var(--glass-border);
  border-radius: 12px;
  color: #fff;
  padding: 10px 15px;
}

.form-control:focus {
  background: rgba(255, 255, 255, 0.15);
  border-color: rgba(255, 255, 255, 0.3);
  color: #fff;
  box-shadow: none;
}

.btn-accent {
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 12px;
  padding: 10px 20px;
  font-weight: 700;
  transition: all 0.3s ease;
}

.btn-accent:hover {
  transform: scale(1.05);
  color: white;
}

.btn-secondary-custom {
  background: rgba(255, 255, 255, 0.1);
  border: 1px solid var(--glass-border);
  color: white;
  border-radius: 12px;
  padding: 10px 20px;
  font-weight: 700;
  transition: all 0.3s ease;
}

.btn-secondary-custom:hover {
  background: rgba(255, 255, 255, 0.2);
  color: white;
  transform: scale(1.05);
}
</style>
</head>

<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">💪 TrackFit</a>
    <div class="ms-auto">
      <a href="/dashboard" class="btn-back"><i class="bi bi-arrow-left"></i> Dashboard</a>
    </div>
  </div>
</nav>

<div class="container py-5">
  <div class="text-center mb-5">
    <h2 class="fw-bold">💧 Hydration Tracker</h2>
    <p class="opacity-75">Stay refreshed and energized</p>
  </div>

  <div class="main-box text-center">
    <!-- GOAL FORM -->
    <div class="mb-4">
      <form method="POST" class="d-flex gap-2 justify-content-center">
        <input type="number" name="goal" class="form-control" 
               value="{{ water.goal }}" min="1" required style="max-width: 120px;">
        <button type="submit" name="set_goal" class="btn-accent">Set Goal</button>
      </form>
    </div>

    <div class="counter">
      {{ water.current }} / {{ water.goal }} <span class="opacity-50 fs-5">Glasses</span>
    </div>

    <div class="glass-box mb-4">
      <div class="water-fill"
           style="height: {{ (water.current / water.goal * 100) | round(0) }}%;">
      </div>
      <div class="bubble" style="left: 20%; width: 10px; height: 10px; animation-delay: 0s;"></div>
      <div class="bubble" style="left: 50%; width: 15px; height: 15px; animation-delay: 1s;"></div>
      <div class="bubble" style="left: 80%; width: 8px; height: 8px; animation-delay: 2s;"></div>
    </div>

    <form method="POST" class="d-grid gap-3">
      <div class="d-flex gap-2">
        <button type="submit" name="add_water" class="btn-accent flex-grow-1 py-3">
          <i class="bi bi-plus-circle me-1"></i> Add Glass
        </button>
        <button type="submit" name="remove_water" class="btn-secondary-custom py-3 px-4">
          <i class="bi bi-dash-circle"></i>
        </button>
      </div>
    </form>
  </div>
</div>

<footer class="text-center py-4 opacity-50">
  © 2025 TrackFit • Stay Hydrated 💪
</footer>

</body>
</html>
