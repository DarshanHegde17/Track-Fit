<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Home Workout – FitnessApp</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
:root {
  --primary: #ffffff;
  --secondary: #888888;
  --bg-dark: #000000;
  --glass: rgba(255, 255, 255, 0.05);
  --glass-border: rgba(255, 255, 255, 0.1);
  --sidebar-width: 280px;
  --accent: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
}

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://images.unsplash.com/photo-1517836357463-d25dfeac3438?auto=format&fit=crop&q=80');
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  color: #fff;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== SIDEBAR ===== */
.sidebar {
  position: fixed;
  top: 0;
  left: 0;
  width: var(--sidebar-width);
  height: 100vh;
  background: rgba(0,0,0,0.9);
  backdrop-filter: blur(15px);
  border-right: 1px solid var(--glass-border);
  z-index: 1000;
  overflow-y: auto;
}

.sidebar-header {
  padding: 20px;
  border-bottom: 1px solid var(--glass-border);
  text-align: center;
}

.nav-cards { padding: 20px 15px; }

.nav-card {
  display: block;
  text-decoration: none;
  color: #fff;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 15px;
  padding: 12px 15px;
  margin-bottom: 10px;
  transition: all 0.3s ease;
}

.nav-card:hover {
  background: rgba(255, 255, 255, 0.1);
  transform: translateX(5px);
  color: #fff;
}

/* ===== MAIN CONTENT ===== */
.main-content {
  margin-left: var(--sidebar-width);
  padding: 20px;
}

.top-bar {
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(10px);
  border: 1px solid var(--glass-border);
  border-radius: 15px;
  padding: 15px 20px;
  margin-bottom: 25px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logout-btn {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  color: #fff;
  border-radius: 10px;
  padding: 8px 16px;
  text-decoration: none;
  transition: all 0.3s ease;
}

.logout-btn:hover {
  background: rgba(255, 255, 255, 0.1);
  color: #fff;
}

@media (max-width: 992px) {
  .sidebar { transform: translateX(-100%); transition: transform 0.3s ease; }
  .sidebar.show { transform: translateX(0); }
  .main-content { margin-left: 0; }
  .mobile-toggle { display: block !important; }
}

/* ================== HEADERS ================== */
h1 {
  text-align: center;
  color: #fff;
  font-weight: 700;
  margin-bottom: 10px;
}
h3 {
  text-align: center;
  color: #fff;
  opacity: 0.8;
  margin-bottom: 30px;
}

/* ================== TIMER ================== */
.timer {
  font-size: 3rem;
  font-weight: 800;
  color: #fff;
  text-align: center;
  margin: 1rem 0;
  text-shadow: 0 0 20px rgba(255,255,255,0.2);
}

/* ================== EXERCISE CARD ================== */
.exercise-card {
  position: relative;
  height: 200px;
  border-radius: 20px;
  background-size: cover;
  background-position: center;
  cursor: pointer;
  display: flex;
  align-items: flex-end;
  padding: 20px;
  color: #fff;
  border: 1px solid var(--glass-border);
  box-shadow: 0 10px 25px rgba(0,0,0,0.35);
  transition: all 0.3s ease;
  overflow: hidden;
}

.exercise-card::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(transparent, rgba(0,0,0,0.8));
  z-index: 1;
}

.exercise-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 15px 35px rgba(0,0,0,0.5);
  border-color: rgba(255,255,255,0.3);
}

.exercise-card-content {
  position: relative;
  z-index: 2;
}

.exercise-card-content h6 { margin-bottom: 5px; font-weight: 700; font-size: 1.1rem; }
.exercise-card-content p { margin: 0; font-size: 0.85rem; color: var(--secondary); font-weight: 600; text-transform: uppercase; }

/* ================== MODAL ================== */
.modal-content {
  background: rgba(0,0,0,0.9);
  backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: 25px;
  color: #fff;
}
.modal img {
  width: 100%;
  max-height: 250px;
  object-fit: cover;
  border-radius: 20px;
  margin-bottom: 20px;
}

.btn-start {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 12px 30px;
  border-radius: 12px;
  font-weight: 700;
  transition: all 0.3s ease;
}
.btn-start:hover { transform: scale(1.05); color: #fff; }

.btn-stop-custom {
  background: rgba(255, 255, 255, 0.1);
  border: 1px solid var(--glass-border);
  color: #fff;
  padding: 12px 30px;
  border-radius: 12px;
  font-weight: 700;
  transition: all 0.3s ease;
}
.btn-stop-custom:hover { background: rgba(255,255,255,0.2); color: #fff; }

.btn-skip-custom {
  background: rgba(220, 53, 69, 0.2);
  border: 1px solid rgba(220, 53, 69, 0.5);
  color: #dc3545;
  padding: 12px 30px;
  border-radius: 12px;
  font-weight: 700;
  transition: all 0.3s ease;
}
.btn-skip-custom:hover { background: rgba(220, 53, 69, 0.3); color: #fff; }

/* ================== COUNTDOWN MODAL ================== */
#countdownModal .modal-content {
  border-radius: 25px;
  padding: 40px;
}
#countdownModal .timer {
  font-size: 4rem;
  color: #fff;
  font-weight: 800;
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h4 class="fw-bold">💪 TrackFit</h4>
    <p class="text-muted small mb-0">Daily Insights</p>
  </div>
  <div class="nav-cards">
    <a href="/dashboard" class="nav-card">🏠 Dashboard</a>
    <a href="/meal" class="nav-card">🍽️ Daily Meal</a>
    <a href="/steps" class="nav-card">🏃‍♂️ Steps</a>
    <a href="/water" class="nav-card">💧 Water</a>
    <a href="/daily-calories" class="nav-card">🔥 Daily Calories</a>
    <a href="/workout" class="nav-card" style="background: rgba(255,255,255,0.15);">🏋️ Workout</a>
    <a href="/monthly-progress" class="nav-card">📊 Monthly Progress</a>
    <a href="/today-progress" class="nav-card">⚡ Progress</a>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="main-content">
  <div class="top-bar">
    <button class="mobile-toggle d-lg-none" onclick="document.getElementById('sidebar').classList.toggle('show')">
      <i class="bi bi-list"></i>
    </button>
    <h5 class="mb-0 fw-bold">🏋️ Training Zone</h5>
    <a href="/logout" class="logout-btn"><i class="bi bi-box-arrow-right"></i> Logout</a>
  </div>

<div class="container">
  <h1>🏋️ Home Workout (30 sec)</h1>
  <h3>🔥 Today Calories: <span id="calories">0</span> kcal</h3>

  <div class="timer" id="timer">00:30</div>

  <div class="row" id="exerciseList"></div>
</div>

<!-- ================== EXERCISE MODAL ================== -->
<div class="modal fade" id="exerciseModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content p-4 text-center">

      <img id="modalImg">

      <h3 id="modalName" class="fw-bold"></h3>
      <p id="modalCalories" class="opacity-75 mb-4"></p>

      <div class="d-flex justify-content-center gap-3">
        <button class="btn-start" onclick="startExercise()">Start</button>
        <button class="btn-stop-custom" onclick="stopExercise()">Stop</button>
        <button class="btn-skip-custom" onclick="skipExercise()">Skip</button>
      </div>

    </div>
  </div>
</div>

<!-- ================== COUNTDOWN MODAL ================== -->
<div class="modal fade" id="countdownModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content text-center">
      <h3>🔥 Exercise In Progress</h3>
      <div class="timer" id="countdownTimer">00:30</div>
      <p id="countdownExerciseName"></p>
      <button class="btn-skip-custom mt-3" onclick="stopExercise()">Stop</button>
    </div>
  </div>
</div>

<footer class="text-center py-4 opacity-50">
  © 2025 TrackFit • Monochromatic Excellence
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
/* ================== DAILY RESET ================== */
const today = new Date().toDateString();
if (localStorage.getItem("lastWorkoutDate") !== today) {
  localStorage.setItem("lastWorkoutDate", today);
  localStorage.removeItem("totalCalories");
}

let totalCalories = parseInt(localStorage.getItem("totalCalories")) || 0;
document.getElementById("calories").innerText = totalCalories;

/* ================== DATA FROM FLASK ================== */
const exercises = [
{% for w in workout_plan %}
  ["{{ w.name }}", {{ w.calories }}, "{{ url_for('static', filename=w.image) }}"]{% if not loop.last %},{% endif %}
{% endfor %}
];

/* ================== RENDER GRID ================== */
document.getElementById("exerciseList").innerHTML = exercises.map(e => `
<div class="col-xl-4 col-md-6 mb-4">
  <div class="exercise-card"
       style="background-image:url('${e[2]}');"
       onclick="openModal('${e[0]}', ${e[1]}, '${e[2]}')">
    <div class="exercise-card-content w-100">
      <h6>${e[0]}</h6>
      <p>${e[1]} KCAL BURN</p>
    </div>
  </div>
</div>
`).join("");


/* ================== TIMER LOGIC ================== */
let timer = null;
let timeLeft = 30;
let running = false;
let currentExercise = "";
let currentCalories = 0;
let modalInstance = null;

function openModal(name, calories, img) {
  currentExercise = name;
  currentCalories = calories;

  timeLeft = 30;
  running = false;
  clearInterval(timer);


  document.getElementById("timer").innerText = "00:30"; // Reset main timer display
  document.getElementById("modalName").innerText = name;
  document.getElementById("modalCalories").innerText = calories + " kcal (30 sec)";
  document.getElementById("modalImg").src = img;

  modalInstance = new bootstrap.Modal(document.getElementById("exerciseModal"));
  modalInstance.show();
}

/* ================== START EXERCISE ================== */
function startExercise() {
  if (running) return;

  running = true;
  clearInterval(timer);

  // Hide previous modal
  if (modalInstance) modalInstance.hide();

  // Show countdown modal
  const countdownInstance = new bootstrap.Modal(document.getElementById("countdownModal"));
  document.getElementById("countdownTimer").innerText = "00:30";
  document.getElementById("countdownExerciseName").innerText = currentExercise + " (30 sec)";
  countdownInstance.show();

  timeLeft = 30;

  timer = setInterval(() => {
    timeLeft--;
    document.getElementById("countdownTimer").innerText =
      "00:" + (timeLeft < 10 ? "0" : "") + timeLeft;

    if (timeLeft <= 0) {
      clearInterval(timer);
      running = false;

      // Close countdown modal
      countdownInstance.hide();

      finishExercise();
    }
  }, 1000);
}

function stopExercise() {
  clearInterval(timer);
  running = false;
  timeLeft = 30; // Reset timeLeft
  document.getElementById("timer").innerText = "00:30";

  // Hide all modals
  if (modalInstance) modalInstance.hide();
  const countdownModalEl = document.getElementById("countdownModal");
  const countdownModal = bootstrap.Modal.getInstance(countdownModalEl);
  if (countdownModal) countdownModal.hide();
}

function skipExercise() {
  stopExercise();
}

function finishExercise() {
  totalCalories += currentCalories;
  localStorage.setItem("totalCalories", totalCalories);
  document.getElementById("calories").innerText = totalCalories; // Update main calories display
  document.getElementById("timer").innerText = "00:30";

  fetch("/workout/save", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      exercise: currentExercise,
      calories: currentCalories
    })
  });
}
</script>

</body>
</html>
