<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up - TrackFit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1517836357463-d25dfeac3438?auto=format&fit=crop&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            padding: 40px 20px;
            color: #fff;
        }
        .signup-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            max-width: 450px; width: 100%; margin: auto;
        }
        .signup-card h2 {
            color: #fff;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .form-label {
            font-weight: 500;
            color: #ccc;
        }
        .form-control {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 12px 15px;
            border-radius: 12px;
            color: #fff;
        }
        .form-control:focus { background: rgba(255, 255, 255, 0.2); color: #fff; border-color: #fff; box-shadow: none; }
        .form-control::placeholder { color: rgba(255, 255, 255, 0.6); }
        .btn-signup { 
            background-color: #fff;
            color: #000;
            border: none;
            border-radius: 12px; 
            padding: 12px; 
            font-weight: 700; 
            transition: all 0.3s ease; 
        }
        .btn-signup:hover { 
            background-color: #ccc;
            transform: translateY(-2px); 
            box-shadow: 0 8px 20px rgba(255, 255, 255, 0.2); 
        }
        .text-muted { color: #aaa !important; }
        .link-light { color: #fff; font-weight: bold; text-decoration: none; }
        .link-light:hover { color: #ccc; }
    </style>
</head>
<body>
    <div class="signup-card">
        <h2 class="text-center fw-bold mb-4">Join TrackFit</h2>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" name="name" class="form-control" placeholder="Enter your full name" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Mobile Number</label>
                <input type="text" name="mobile" class="form-control" placeholder="Enter mobile number" required>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Weight (kg)</label>
                    <input type="number" name="weight" class="form-control" placeholder="kg" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Height (cm)</label>
                    <input type="number" name="height" class="form-control" placeholder="cm" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Choose a username" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Create Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-signup w-100 py-2 mb-3">Create Account</button>
        </form>
        
        <div class="text-center">
            <p class="mb-0 text-muted">Already have an account? <a href="/login" class="link-light">Login</a></p>
            <a href="/" class="text-light opacity-75 small text-decoration-none mt-2 d-inline-block">← Back to Home</a>
        </div>
    </div>
</body>
</html>
